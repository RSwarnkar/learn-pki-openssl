name: Workflow-05 CSR Automated

on:
  push:
    branches:
      - main
    paths:
      - "05-cert-sign-cicd/**"
      - ".github/workflows/workflow-05.yml"
  workflow_dispatch:

jobs:
  csr-ecc:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Openssl Version 
        run: openssl version
      - name: Generate Root CA Private Key 
        run: openssl ecparam -genkey -name prime256v1 -out private-key.pem -noout
        working-directory: ./05-cert-sign-cicd/ECC/Litware-Root-CA/Private-Key
      - name: Check Root CA Private Key 
        run: cat private-key.pem
        working-directory: ./05-cert-sign-cicd/ECC/Litware-Root-CA/Private-Key
      - name: Generate Public Key
        run: openssl rsa -in private-key.pem -pubout -out ../Public-Key/public-key.pub
        working-directory: ./05-cert-sign-cicd/ECC/Litware-Root-CA/Private-Key


        